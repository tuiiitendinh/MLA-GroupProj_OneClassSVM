<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Patch window.fetch to prevent libraries from trying to overwrite it if it's read-only
      (function() {
        try {
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && !descriptor.writable && !descriptor.set && descriptor.configurable) {
            const originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              get: () => originalFetch,
              set: (v) => { 
                console.warn('Attempted to overwrite window.fetch. Ignoring.', v);
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // Ignore errors during patching
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
